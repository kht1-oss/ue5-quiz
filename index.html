<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UE5 개념 퀴즈</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container { max-width: 720px; width: 100%; }

/* 모드 선택 */
.mode-screen { text-align: center; }
.mode-screen h1 { font-size: 28px; color: #64b5f6; margin-bottom: 10px; }
.mode-screen p  { color: #888; font-size: 15px; margin-bottom: 40px; }
.mode-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.mode-btn {
  padding: 24px 40px;
  border: 2px solid #64b5f6;
  border-radius: 10px;
  background: #16213e;
  color: #64b5f6;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}
.mode-btn:hover { background: #1e3a6e; }

/* 퀴즈 상단 모드 전환 바 */
.top-nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.nav-btn {
  padding: 8px 16px;
  border: 2px solid #333;
  border-radius: 8px;
  background: #16213e;
  color: #888;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}
.nav-btn:hover { border-color: #64b5f6; color: #64b5f6; }
.nav-btn.active { border-color: #64b5f6; background: #1e3a6e; color: #64b5f6; }

/* 공통 */
.progress { text-align: right; font-size: 14px; color: #888; margin-bottom: 12px; }
.concept  { font-size: 30px; font-weight: bold; color: #64b5f6; text-align: center; margin-bottom: 32px; }

/* 객관식 */
.choices { display: flex; flex-direction: column; gap: 12px; }
.choice {
  padding: 16px 20px;
  border: 2px solid #333;
  border-radius: 8px;
  background: #16213e;
  color: #eee;
  font-size: 15px;
  line-height: 1.6;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s;
}
.choice:hover { border-color: #64b5f6; }
.choice.correct { border-color: #4caf50; background: #1a3320; color: #a5d6a7; }
.choice.wrong   { border-color: #f44336; background: #331a1a; color: #ef9a9a; }
.next-btn {
  display: none;
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: #64b5f6;
  color: #1a1a2e;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
.next-btn:hover { background: #42a5f5; }

/* 주관식 / 6/17 공통 */
.text-label { font-size: 13px; color: #888; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
.text-desc {
  font-size: 16px; line-height: 1.8; color: #eee;
  background: #16213e; border: 2px solid #333; border-radius: 10px;
  padding: 20px; margin-bottom: 20px; white-space: pre-line;
}
.answer-row { display: flex; gap: 12px; align-items: center; }
.answer-input {
  flex: 1; padding: 14px 16px; background: #16213e;
  border: 2px solid #333; border-radius: 8px; color: #eee;
  font-size: 16px; font-family: inherit; outline: none;
}
.answer-input:focus { border-color: #64b5f6; }
.answer-input.correct { border-color: #4caf50; background: #1a3320; color: #a5d6a7; }
.answer-input.wrong   { border-color: #f44336; background: #331a1a; color: #ef9a9a; }
.check-btn {
  padding: 14px 24px; background: #64b5f6; color: #1a1a2e;
  border: none; border-radius: 8px; font-size: 15px; font-weight: bold;
  cursor: pointer; white-space: nowrap;
}
.check-btn:hover { background: #42a5f5; }
.check-btn:disabled { background: #444; color: #888; cursor: default; }
.text-feedback {
  display: none; margin-top: 16px; padding: 14px 18px;
  border-radius: 8px; font-size: 15px; line-height: 1.6;
}
.text-feedback.correct { border: 2px solid #4caf50; background: #1a3320; color: #a5d6a7; }
.text-feedback.wrong   { border: 2px solid #f44336; background: #331a1a; color: #ef9a9a; }

/* 결과 */
.result { text-align: center; display: none; }
.result h2 { font-size: 32px; color: #64b5f6; margin-bottom: 16px; }
.result p  { font-size: 22px; margin-bottom: 32px; color: #eee; }
.result-btns { display: flex; gap: 12px; justify-content: center; }
.retry-btn {
  padding: 14px 32px; background: #64b5f6; color: #1a1a2e;
  border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
}
.retry-btn:hover { background: #42a5f5; }
.home-btn {
  padding: 14px 32px; background: transparent; border: 2px solid #64b5f6;
  border-radius: 8px; color: #64b5f6; font-size: 16px; font-weight: bold; cursor: pointer;
}
.home-btn:hover { background: #1e3a6e; }
</style>
</head>
<body>
<div class="container">

  <!-- 모드 선택 화면 -->
  <div id="mode-screen" class="mode-screen">
    <h1>UE5 개념 퀴즈</h1>
    <p>학습 모드를 선택하세요</p>
    <div class="mode-btns">
      <button class="mode-btn" onclick="startMode('mc')">객관식</button>
      <button class="mode-btn" onclick="startMode('sa')">주관식</button>
      <button class="mode-btn" onclick="startMode('617')">6/17 추가</button>
    </div>
  </div>

  <!-- 퀴즈 화면 -->
  <div id="quiz" style="display:none;">
    <div class="top-nav">
      <button class="nav-btn" id="nav-mc"  onclick="startMode('mc')">객관식</button>
      <button class="nav-btn" id="nav-sa"  onclick="startMode('sa')">주관식</button>
      <button class="nav-btn" id="nav-617" onclick="startMode('617')">6/17 추가</button>
    </div>
    <div class="progress" id="progress"></div>
    <div class="concept" id="concept"></div>

    <!-- 객관식 영역 -->
    <div id="mc-section" style="display:none;">
      <div class="choices" id="choices"></div>
      <button class="next-btn" id="next-btn" onclick="nextQ()">다음 문제 →</button>
    </div>

    <!-- 주관식 / 6/17 영역 -->
    <div id="text-section" style="display:none;">
      <div class="text-label">이 설명에 해당하는 개념은?</div>
      <div class="text-desc" id="text-desc"></div>
      <div class="answer-row">
        <input class="answer-input" id="text-input" type="text" placeholder="개념 이름을 입력하세요..." autocomplete="off">
        <button class="check-btn" id="text-check-btn" onclick="checkText()">채점</button>
      </div>
      <div class="text-feedback" id="text-feedback"></div>
      <button class="next-btn" id="text-next-btn" onclick="nextQ()" style="display:none;">다음 문제 →</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div class="result" id="result">
    <h2>퀴즈 완료!</h2>
    <p id="score-text"></p>
    <div class="result-btns">
      <button class="retry-btn" onclick="startMode(currentMode)">다시 풀기</button>
      <button class="home-btn" onclick="goHome()">모드 선택</button>
    </div>
  </div>

</div>

let currentMode = null, idx = 0, score = 0, selected = null;

function getQuestions() {
  if (currentMode === 'sa')  return Q_SA;
  if (currentMode === '617') return Q_617;
  return Q;
}

function startMode(m) {
  currentMode = m;
  idx = 0; score = 0; selected = null;
  document.getElementById('mode-screen').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  render();
}

function render() {
  selected = null;
  const qs = getQuestions();
  const q = qs[idx];
  const isLast = idx === qs.length - 1;

  document.getElementById('progress').textContent = `${idx + 1} / ${qs.length}`;

  ['mc', 'sa', '617'].forEach(m => {
    document.getElementById('nav-' + m).classList.toggle('active', currentMode === m);
  });

  if (currentMode === 'mc') {
    document.getElementById('concept').style.display = 'block';
    document.getElementById('concept').textContent = q.concept;
    document.getElementById('mc-section').style.display = 'block';
    document.getElementById('text-section').style.display = 'none';
    renderMC(q, isLast);
  } else {
    document.getElementById('concept').style.display = 'none';
    document.getElementById('mc-section').style.display = 'none';
    document.getElementById('text-section').style.display = 'block';
    renderText(q, isLast);
  }
}

function renderMC(q, isLast) {
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = text;
    btn.onclick = () => pick(i);
    choicesEl.appendChild(btn);
  });
  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'none';
  nextBtn.textContent = isLast ? '완료' : '다음 문제 →';
}

function renderText(q, isLast) {
  document.getElementById('text-desc').textContent = q.desc;
  const input = document.getElementById('text-input');
  input.value = '';
  input.className = 'answer-input';
  input.disabled = false;
  document.getElementById('text-check-btn').disabled = false;
  const feedback = document.getElementById('text-feedback');
  feedback.style.display = 'none';
  feedback.className = 'text-feedback';
  const nextBtn = document.getElementById('text-next-btn');
  nextBtn.style.display = 'none';
  nextBtn.textContent = isLast ? '완료' : '다음 문제 →';
  input.focus();
}

function pick(i) {
  const q = Q[idx];
  const btns = document.querySelectorAll('.choice');
  btns.forEach(b => b.classList.remove('correct', 'wrong'));
  selected = i;
  if (i === q.correctIndex) {
    btns[i].classList.add('correct');
  } else {
    btns[i].classList.add('wrong');
    btns[q.correctIndex].classList.add('correct');
  }
  document.getElementById('next-btn').style.display = 'block';
}

function checkText() {
  const qs = getQuestions();
  const input = document.getElementById('text-input');
  const q = qs[idx];
  let isCorrect;
  if (q.caseSensitive) {
    const typed = input.value.trim();
    isCorrect = q.answers.includes(typed);
  } else {
    const typed = input.value.trim().toLowerCase();
    isCorrect = q.answers.includes(typed);
  }
  if (isCorrect) score++;
  input.className = 'answer-input ' + (isCorrect ? 'correct' : 'wrong');
  input.disabled = true;
  document.getElementById('text-check-btn').disabled = true;
  const feedback = document.getElementById('text-feedback');
  feedback.style.display = 'block';
  if (isCorrect) {
    feedback.className = 'text-feedback correct';
    feedback.textContent = '정답입니다!';
  } else {
    feedback.className = 'text-feedback wrong';
    feedback.textContent = `오답! 정답: ${q.answers[0]}`;
  }
  document.getElementById('text-next-btn').style.display = 'block';
}

function nextQ() {
  const qs = getQuestions();
  if (currentMode === 'mc' && selected === Q[idx].correctIndex) score++;
  idx++;
  if (idx >= qs.length) {
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('score-text').textContent = `총점: ${score} / ${qs.length}`;
  } else {
    render();
  }
}

function goHome() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('mode-screen').style.display = 'block';
}

document.addEventListener('keydown', e => {
  if ((currentMode === 'sa' || currentMode === '617') && e.key === 'Enter') {
    const btn = document.getElementById('text-check-btn');
    if (!btn.disabled) checkText();
  }
});
